{% extends "base.html" %}
{% block content %}
<h2>Login</h2>
<form method="POST">
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <!-- Hidden field to carry guest notes (from localStorage) during login for syncing -->
    <input type="hidden" name="local_notes" id="local_notes_input">
    <button type="submit">Login</button>
</form>
<p>Don’t have an account? <a href="{{ url_for('register') }}">Register</a></p>
<p>Or continue without an account</p>
<a href="{{ url_for('index') }}" class="guest-btn">Continue as Guest</a>

<script>
document.addEventListener('DOMContentLoaded', function () {
    var form = document.querySelector('form');
    var localNotesInput = document.getElementById('local_notes_input');

    if (form && localNotesInput) {
        form.addEventListener('submit', function () {
            try {
                var raw = localStorage.getItem('notes_guest');
                if (raw) {
                    localNotesInput.value = raw;
                }
            } catch (e) {
                console.error('Unable to read guest notes from localStorage', e);
            }
        });
    }
});
</script>
{% endblock %}
